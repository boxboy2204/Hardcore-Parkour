<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardcore Parkour - Prototype</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <aside class="corner-tv" id="cornerTv" aria-hidden="true">
      <div class="corner-tv__logo" id="cornerLogo">
        <span class="corner-tv__logo-main">DVD</span>
        <span class="corner-tv__logo-sub">VIDEO</span>
      </div>
    </aside>

    <main class="app">
      <section class="hud">
        <div class="hud-top">
          <h1>Hardcore Parkour</h1>
          <div class="controls hud-controls">
            <select id="characterSelect" aria-label="Runner select" hidden>
              <option value="michael">Michael</option>
              <option value="dwight">Dwight</option>
              <option value="andy">Andy</option>
            </select>
            <button id="startBtn">Start Run</button>
          </div>
        </div>
        <p class="help">Menu: click a Sticky Note then <kbd>Enter</kbd>/<kbd>Launch Level</kbd>. Run: <kbd>Enter</kbd> pause, <kbd>Space</kbd> jump/slide, <kbd>J</kbd> PARKOUR, <kbd>K</kbd> hit. Missions: <kbd>M</kbd>. Character Select: <kbd>C</kbd>. Dunder Mifflin chaos encouraged.</p>
      </section>

      <section class="game-stage">
        <canvas id="game" width="960" height="540" aria-label="Hardcore Parkour game area"></canvas>

        <section class="panel panel--review" id="summaryPanel" hidden>
          <h2>Performance Review</h2>
          <p id="summaryText"></p>
          <div class="controls">
            <button id="retryBtn">Run It Back</button>
            <button id="nextLevelBtn" hidden>Continue To Next Level</button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
